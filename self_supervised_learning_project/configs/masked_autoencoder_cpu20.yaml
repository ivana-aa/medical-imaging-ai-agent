project:
  seed: 42
  output_dir: runs/masked_autoencoder_cpu20

data:
  root: ../Dataset
  train_split: train
  image_dir_name: images
  image_channels: 1
  image_size: 128
  batch_size: 16
  num_workers: 0

augment:
  horizontal_flip_p: 0.5
  vertical_flip_p: 0.5

model:
  backbone: resnet18

training:
  epochs: 20
  lr: 0.001
  weight_decay: 0.0001
  scheduler: cosine
  mask_ratio: 0.6
  patch_size: 16
  mask_fill_value: 0.0
  loss: smooth_l1
  save_every: 5
