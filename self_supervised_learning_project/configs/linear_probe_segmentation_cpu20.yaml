project:
  seed: 42
  output_dir: runs/linear_probe_segmentation_cpu20

data:
  root: ../Dataset
  train_split: train
  val_split: val
  image_dir_name: images
  label_dir_name: labels
  image_channels: 1
  image_size: 128
  batch_size: 8
  num_workers: 0

model:
  backbone: resnet18
  checkpoint: runs/simclr_medical_cpu20/best.pt

training:
  epochs: 20
  lr: 0.001
  weight_decay: 0.0001
  dice_weight: 1.0
  threshold: 0.5
  log_interval: 20
