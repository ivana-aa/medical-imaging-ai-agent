project:
  seed: 42
  output_dir: runs/decoder_finetune_mim_cpu100_hard_label5_aug

data:
  root: ../Dataset
  train_split: train
  val_split: val
  image_dir_name: images
  label_dir_name: labels
  image_channels: 1
  image_size: 128
  batch_size: 8
  num_workers: 0
  train_fraction: 0.05
  subset_seed: 42

augment:
  enabled: true
  rotation_degrees: 8
  translate_fraction: 0.04
  scale_range: [0.95, 1.08]
  horizontal_flip_p: 0.0
  vertical_flip_p: 0.0
  brightness: 0.12
  contrast: 0.12
  noise_std: 0.015

model:
  backbone: resnet18
  checkpoint: runs/masked_autoencoder_cpu100_hard/best.pt
  freeze_encoder: false

training:
  epochs: 30
  encoder_lr: 0.0001
  decoder_lr: 0.001
  weight_decay: 0.0001
  dice_weight: 1.0
  threshold: 0.5
